<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>My Prospect</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
#map {
  height: 400px;
  width: 100%;
  border-radius: 10px;
  margin-top: 10px;
}
</style>

</head>

<body>

<!-- AUTH -->
<div id="auth" class="auth-container">
  <div class="card">
    <h2>Connexion</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Mot de passe">
    <button onclick="login()">Se connecter</button>
    <button onclick="register()">Créer un compte</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

  <div class="app-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">

      <!-- ✅ LOGO FIX -->
      <div class="logo">
        <img src="./logo.png" class="logo-big" alt="My Prospect logo">
      </div>

      <nav>
        <button onclick="showSection('dashboard')">📊 Dashboard</button>
        <button onclick="showSection('clients')">👥 Clients</button>
        <button onclick="showSection('mapSection')">🗺️ Carte</button>
      </nav>

      <button onclick="logout()" class="logout">🚪 Déconnexion</button>
    </aside>

    <!-- MAIN -->
    <main class="main">

      <div class="container">

        <div id="dashboard" class="section active">
          <div class="card">
            <h2>📊 Dashboard</h2>
            <p>Total clients : <span id="total">0</span></p>
          </div>
        </div>

        <div id="clients" class="section">
          <div class="grid">

            <div class="card">
              <input id="name" placeholder="Nom">
              <input id="phone" placeholder="Téléphone">
              <input id="address" placeholder="Adresse">
              <button onclick="addClient()">Ajouter</button>
            </div>

            <div class="card">
              <h2>Clients</h2>
              <div id="list"></div>
            </div>

          </div>
        </div>

        <div id="mapSection" class="section">
          <div class="card">
            <h2>🗺️ Carte des clients</h2>
            <div id="map"></div>
          </div>
        </div>

      </div>

    </main>

  </div>

</div>

<script src="app.js"></script>

</body>
</html>
