<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Prospect</title>

<link rel="stylesheet" href="style.css">

<!-- LEAFLET -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

<!-- CHART -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
#map {
  height: 400px;
  width: 100%;
  border-radius: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader" class="loader" style="display:none;">
  <div class="spinner"></div>
</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<!-- AUTH -->
<div id="auth" class="auth-container">
  <div class="card">
    <h2>Connexion</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Mot de passe">
    <button onclick="login()">Se connecter</button>
    <button onclick="register()">Créer un compte</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

  <div class="app-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">

      <div class="logo">
        <img src="./logo.png" class="logo-big" alt="logo">
      </div>

      <!-- 🔥 NAVIGATION SAAS -->
      <nav>
        <button onclick="showSection('dashboard', event)" class="active">📊 Dashboard</button>
        <button onclick="showSection('clients', event)">👥 Clients</button>
        <button onclick="showSection('favorites', event)">⭐ Favoris</button>
        <button onclick="showSection('analytics', event)">📈 Analytics</button>
        <button onclick="showSection('mapSection', event)">🗺️ Carte</button>
        <button onclick="showSection('settings', event)">⚙️ Paramètres</button>
      </nav>

      <button onclick="logout()" class="logout">🚪 Déconnexion</button>

    </aside>

    <!-- MAIN -->
    <main class="main">

      <div class="container">

        <!-- ================= DASHBOARD ================= -->
        <div id="dashboard" class="section active">
          <div class="card">
            <h2>📊 Dashboard</h2>
            <p>Total clients : <span id="total">0</span></p>
            <canvas id="chart"></canvas>
          </div>
        </div>

        <!-- ================= CLIENTS ================= -->
        <div id="clients" class="section">

          <!-- SEARCH -->
          <div class="card">
            <input id="search" placeholder="🔎 Rechercher un client..." oninput="filterClients()">
          </div>

          <div class="grid">

            <!-- ADD -->
            <div class="card">
              <h2>Ajouter un client</h2>
              <input id="name" placeholder="Nom">
              <input id="phone" placeholder="Téléphone">
              <input id="address" placeholder="Adresse">
              <button onclick="addClient()">Ajouter</button>
            </div>

            <!-- LIST -->
            <div class="card">
              <h2>Liste clients</h2>
              <div id="list"></div>
            </div>

          </div>

        </div>

        <!-- ================= FAVORITES ================= -->
        <div id="favorites" class="section">
          <div class="card">
            <h2>⭐ Clients favoris</h2>
            <div id="favoritesList"></div>
          </div>
        </div>

        <!-- ================= ANALYTICS ================= -->
        <div id="analytics" class="section">
          <div class="card">
            <h2>📈 Analyse des clients</h2>
            <canvas id="analyticsChart"></canvas>
          </div>
        </div>

        <!-- ================= MAP ================= -->
        <div id="mapSection" class="section">
          <div class="card">
            <h2>🗺️ Carte des clients</h2>
            <div id="map"></div>
          </div>
        </div>

        <!-- ================= SETTINGS ================= -->
        <div id="settings" class="section">
          <div class="card">
            <h2>⚙️ Paramètres</h2>

            <p><strong>Compte utilisateur</strong></p>

            <div class="card" style="margin-top:10px;">
              <p>Email : <span id="userEmail">...</span></p>
              <p>Total clients : <span id="userStats">0</span></p>
            </div>

            <button onclick="logout()">🚪 Se déconnecter</button>

            <hr style="margin:20px 0; border-color:#1e293b;">

            <button style="background:#ef4444;">
              🗑️ Supprimer mon compte (à venir)
            </button>

          </div>
        </div>

      </div>

    </main>

  </div>

</div>

<!-- LEAFLET -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- APP -->
<script src="app.js"></script>

</body>
</html>
