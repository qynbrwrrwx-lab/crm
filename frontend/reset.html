<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Reset password</title>
<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
.card {
  background: #1e293b;
  padding: 40px;
  border-radius: 10px;
  text-align: center;
}
input {
  padding: 10px;
  margin-top: 10px;
  width: 100%;
}
button {
  margin-top: 15px;
  padding: 10px;
}
</style>
</head>

<body>

<div class="card">
  <h2>Nouveau mot de passe</h2>
  <input id="password" type="password" placeholder="Nouveau mot de passe">
  <button onclick="reset()">Valider</button>
</div>

<script>
const token = window.location.pathname.split("/").pop();

async function reset() {
  const password = document.getElementById("password").value;

  const res = await fetch("/reset-password/" + token, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ password })
  });

  const data = await res.json();

  if (data.success) {
    alert("Mot de passe changé ✅");
    window.location.href = "/";
  } else {
    alert(data.error);
  }
}
</script>

</body>
</html>
