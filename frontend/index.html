<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Prospect</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* ===== MAP ===== */
#map {
  height: 400px;
  width: 100%;
  border-radius: 10px;
  margin-top: 10px;
}

/* ===== AUTH MODERNE ===== */
.auth-container {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #0f172a, #1e293b);
}

.card {
  background: white;
  padding: 35px;
  border-radius: 14px;
  width: 340px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  text-align: center;
}

.card h2 {
  margin-bottom: 10px;
}

.card input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #e2e8f0;
  outline: none;
}

.card input:focus {
  border-color: #3b82f6;
}

/* boutons principaux */
.primary-btn {
  margin-top: 15px;
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: #3b82f6;
  color: white;
  cursor: pointer;
}

.primary-btn:hover {
  background: #2563eb;
}

.secondary-btn {
  margin-top: 10px;
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #f1f5f9;
  cursor: pointer;
}

/* liens */
.auth-links {
  margin-top: 15px;
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.auth-links button {
  background: none;
  border: none;
  color: #3b82f6;
  cursor: pointer;
  font-size: 13px;
}

.auth-links button:hover {
  text-decoration: underline;
}
</style>
</head>

<body>

<div id="loader" class="loader" style="display:none;">
  <div class="spinner"></div>
</div>

<div id="toast" class="toast"></div>

<!-- ================= AUTH ================= -->
<div id="auth" class="auth-container">
  <div class="card">

    <h2>My Prospect</h2>
    <p style="font-size:14px;color:#64748b;">Connecte-toi à ton CRM</p>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Mot de passe">

    <button class="primary-btn" onclick="login()">Se connecter</button>

    <button class="secondary-btn" onclick="register()">
      Créer un compte
    </button>

    <div class="auth-links">
      <button onclick="resendEmail()">📩 Renvoyer email</button>
      <button onclick="requestReset()">🔐 Mot de passe oublié</button>
    </div>

  </div>
</div>

<!-- ================= APP ================= -->
<div id="app" style="display:none;">
  <div class="app-layout">

    <aside class="sidebar">
      <div class="logo">
        <img src="./logo.png" class="logo-big" alt="logo">
      </div>

      <nav>
        <button onclick="showSection('dashboard', event)" class="active">📊 Dashboard</button>
        <button onclick="showSection('clients', event)">👥 Clients</button>
        <button onclick="showSection('favorites', event)">⭐ Favoris</button>
        <button onclick="showSection('analytics', event)">📈 Analytics</button>
        <button onclick="showSection('mapSection', event)">🗺️ Carte</button>
        <button onclick="showSection('settings', event)">⚙️ Paramètres</button>
      </nav>

      <button onclick="logout()" class="logout">🚪 Déconnexion</button>
    </aside>

    <main class="main">
      <div class="container">

        <div id="dashboard" class="section active">
          <div class="card">
            <h2>📊 Dashboard</h2>
            <p>Total clients : <span id="total">0</span></p>
            <canvas id="chart"></canvas>
          </div>
        </div>

        <div id="clients" class="section">
          <div class="card">
            <input id="search" placeholder="🔎 Rechercher..." oninput="filterClients()">
          </div>

          <div class="grid">
            <div class="card">
              <h2>Ajouter un client</h2>
              <input id="name" placeholder="Nom">
              <input id="phone" placeholder="Téléphone">
              <input id="address" placeholder="Adresse">
              <button onclick="addClient()">Ajouter</button>
            </div>

            <div class="card">
              <h2>Liste clients</h2>
              <div id="list"></div>
            </div>
          </div>
        </div>

        <div id="favorites" class="section">
          <div class="card">
            <h2>⭐ Favoris</h2>
            <div id="favoritesList"></div>
          </div>
        </div>

        <div id="analytics" class="section">
          <div class="card">
            <h2>📈 Analytics</h2>
            <canvas id="analyticsChart"></canvas>
          </div>
        </div>

        <div id="mapSection" class="section">
          <div class="card">
            <h2>🗺️ Carte</h2>
            <div id="map"></div>
          </div>
        </div>

        <div id="settings" class="section">
          <div class="card">
            <h2>⚙️ Paramètres</h2>
            <p>Total clients : <span id="userStats">0</span></p>
            <button onclick="logout()">🚪 Déconnexion</button>
          </div>
        </div>

      </div>
    </main>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="app.js"></script>

<!-- ================= AUTH JS ================= -->
<script>

// 📩 RESEND EMAIL
async function resendEmail() {
  const email = document.getElementById("email").value;
  if (!email) return showToast("Entre ton email 📧");

  const res = await fetch("/resend-verification", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ email })
  });

  showToast("Email renvoyé 📩");
}

// 🔐 RESET PASSWORD
async function requestReset() {
  const email = document.getElementById("email").value;
  if (!email) return showToast("Entre ton email 📧");

  await fetch("/request-reset", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ email })
  });

  showToast("Email de reset envoyé 🔐");
}

</script>

</body>
</html>
